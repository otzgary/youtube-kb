<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ video.title }} - YouTube 知识库</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f0f;
      color: #f1f1f1;
      min-height: 100vh;
    }

    .detail {
      max-width: 800px;
      margin: 0 auto;
      padding: 30px 20px;
    }

    .back-link {
      display: inline-block;
      color: #3ea6ff;
      text-decoration: none;
      margin-bottom: 20px;
      font-size: 14px;
    }

    .back-link:hover { text-decoration: underline; }

    .detail-header {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
    }

    .thumbnail {
      flex-shrink: 0;
      width: 320px;
      height: 180px;
      border-radius: 8px;
      overflow: hidden;
      background: #272727;
    }

    .thumbnail img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .video-info {
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .video-title {
      font-size: 20px;
      font-weight: 500;
      margin-bottom: 10px;
      line-height: 1.4;
    }

    .video-meta {
      display: flex;
      gap: 16px;
      font-size: 13px;
      color: #aaa;
      margin-bottom: 14px;
    }

    .video-actions a {
      display: inline-block;
      margin-right: 16px;
      font-size: 13px;
      color: #3ea6ff;
      text-decoration: none;
    }

    .video-actions a:hover { text-decoration: underline; }

    .section-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #fff;
    }

    .transcript {
      background: #181818;
      border-radius: 12px;
      padding: 24px;
      line-height: 1.9;
      font-size: 15px;
      color: #ddd;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .transcript mark {
      background: rgba(62, 166, 255, 0.25);
      color: #3ea6ff;
      padding: 1px 3px;
      border-radius: 2px;
    }

    @media (max-width: 640px) {
      .detail-header { flex-direction: column; }
      .thumbnail { width: 100%; height: auto; aspect-ratio: 16/9; }
    }
  </style>
</head>
<body>
  <div class="detail">
    <a class="back-link" href="{% if query %}/?q={{ query }}{% else %}/{% endif %}">&larr; 返回搜索</a>

    <div class="detail-header">
      <div class="thumbnail">
        {% if video.thumbnail %}
          <img src="{{ video.thumbnail }}" alt="{{ video.title }}">
        {% endif %}
      </div>
      <div class="video-info">
        <div class="video-title">{{ video.title }}</div>
        <div class="video-meta">
          <span>{{ video.date|format_date }}</span>
          <span>{{ video.view_count|format_views }} 次观看</span>
          <span>{{ video.like_count|format_views }} 点赞</span>
        </div>
        <div class="video-actions">
          <a href="{{ video.url }}" target="_blank">在 YouTube 观看</a>
        </div>
      </div>
    </div>

    <div class="section-title">完整文稿</div>
    <div class="transcript">{{ content_html|safe }}</div>
  </div>
</body>
</html>
