<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>后台管理 - YouTube 知识库</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f0f;
      color: #f1f1f1;
      min-height: 100vh;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 30px 20px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }

    .top-bar h1 {
      font-size: 24px;
      font-weight: 600;
    }

    .top-bar a {
      color: #3ea6ff;
      text-decoration: none;
      font-size: 14px;
    }

    .stats {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: #181818;
      border-radius: 12px;
      padding: 20px 24px;
      flex: 1;
    }

    .stat-card .label {
      font-size: 13px;
      color: #aaa;
      margin-bottom: 6px;
    }

    .stat-card .value {
      font-size: 28px;
      font-weight: 600;
      color: #3ea6ff;
    }

    /* 新建任务 */
    .new-task {
      background: #181818;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 30px;
    }

    .new-task h2 {
      font-size: 18px;
      font-weight: 500;
      margin-bottom: 16px;
    }

    .new-task-form {
      display: flex;
      gap: 10px;
    }

    .new-task-form input {
      flex: 1;
      padding: 12px 18px;
      font-size: 15px;
      border: 1px solid #303030;
      border-radius: 8px;
      background: #121212;
      color: #f1f1f1;
      outline: none;
    }

    .new-task-form input:focus {
      border-color: #3ea6ff;
    }

    .new-task-form button {
      padding: 12px 28px;
      font-size: 15px;
      border: none;
      border-radius: 8px;
      background: #3ea6ff;
      color: #0f0f0f;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }

    .new-task-form button:hover {
      background: #65b8ff;
    }

    .new-task-form button:disabled {
      background: #555;
      cursor: not-allowed;
    }

    .hint {
      font-size: 13px;
      color: #666;
      margin-top: 10px;
    }

    /* 任务列表 */
    .tasks h2 {
      font-size: 18px;
      font-weight: 500;
      margin-bottom: 16px;
    }

    .task-card {
      background: #181818;
      border-radius: 12px;
      padding: 20px 24px;
      margin-bottom: 16px;
    }

    .task-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .task-channel {
      font-size: 16px;
      font-weight: 500;
    }

    .task-status {
      font-size: 13px;
      padding: 4px 12px;
      border-radius: 20px;
      font-weight: 500;
    }

    .task-status.starting { background: #333; color: #aaa; }
    .task-status.running { background: #1a3a1a; color: #4caf50; }
    .task-status.done { background: #1a2a3a; color: #3ea6ff; }
    .task-status.error { background: #3a1a1a; color: #f44336; }

    .task-progress {
      margin-bottom: 12px;
    }

    .progress-bar {
      height: 6px;
      background: #272727;
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .progress-fill {
      height: 100%;
      background: #3ea6ff;
      border-radius: 3px;
      transition: width 0.3s;
    }

    .progress-text {
      font-size: 13px;
      color: #aaa;
    }

    .task-log {
      max-height: 200px;
      overflow-y: auto;
      background: #121212;
      border-radius: 8px;
      padding: 12px 16px;
      font-family: "SF Mono", Monaco, "Cascadia Code", monospace;
      font-size: 12px;
      line-height: 1.6;
      color: #999;
    }

    .task-log .ok { color: #4caf50; }
    .task-log .fail { color: #f44336; }
    .task-log .skip { color: #666; }

    .task-time {
      font-size: 12px;
      color: #555;
      margin-top: 8px;
    }

    .no-tasks {
      text-align: center;
      color: #555;
      padding: 40px;
      font-size: 15px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="top-bar">
      <h1>后台管理</h1>
      <a href="/">返回搜索</a>
    </div>

    <div class="stats">
      <div class="stat-card">
        <div class="label">已入库视频</div>
        <div class="value" id="stat-total">{{ stats.total_videos }}</div>
      </div>
      <div class="stat-card">
        <div class="label">运行中任务</div>
        <div class="value" id="stat-running">{{ tasks.values()|selectattr("status", "equalto", "running")|list|length + tasks.values()|selectattr("status", "equalto", "starting")|list|length }}</div>
      </div>
    </div>

    <div class="new-task">
      <h2>添加频道</h2>
      <div class="new-task-form">
        <input type="text" id="channel-url" placeholder="输入 YouTube 频道 URL，例如 https://www.youtube.com/@频道名" />
        <button id="start-btn" onclick="startTask()">开始抓取</button>
      </div>
      <div class="hint">支持频道主页、/videos 页面、播放列表 URL</div>
    </div>

    <div class="tasks">
      <h2>任务列表</h2>
      <div id="task-list">
        <div class="no-tasks">还没有任务</div>
      </div>
    </div>
  </div>

  <script>
    const activeTasks = {};  // task_id -> {since, interval}

    function startTask() {
      const input = document.getElementById('channel-url');
      const btn = document.getElementById('start-btn');
      const url = input.value.trim();
      if (!url) return;

      btn.disabled = true;
      btn.textContent = '提交中...';

      fetch('/admin/start', {
        method: 'POST',
        headers: {'Content-Type': 'application/x-www-form-urlencoded'},
        body: 'url=' + encodeURIComponent(url)
      })
      .then(r => r.json())
      .then(data => {
        if (data.status === 'ok') {
          input.value = '';
          addTaskCard(data.task_id);
          pollTask(data.task_id);
        } else {
          alert(data.message || '提交失败');
        }
      })
      .catch(e => alert('网络错误: ' + e))
      .finally(() => {
        btn.disabled = false;
        btn.textContent = '开始抓取';
      });
    }

    function addTaskCard(taskId) {
      const list = document.getElementById('task-list');
      // 清掉 "还没有任务"
      const empty = list.querySelector('.no-tasks');
      if (empty) empty.remove();

      const card = document.createElement('div');
      card.className = 'task-card';
      card.id = 'task-' + taskId;
      card.innerHTML = `
        <div class="task-header">
          <span class="task-channel" id="task-channel-${taskId}">获取中...</span>
          <span class="task-status starting" id="task-status-${taskId}">启动中</span>
        </div>
        <div class="task-progress">
          <div class="progress-bar"><div class="progress-fill" id="task-bar-${taskId}" style="width:0%"></div></div>
          <div class="progress-text" id="task-progress-${taskId}"></div>
        </div>
        <div class="task-log" id="task-log-${taskId}"></div>
      `;
      list.prepend(card);
    }

    function pollTask(taskId) {
      let since = 0;
      const interval = setInterval(() => {
        fetch('/admin/task/' + taskId + '?since=' + since)
          .then(r => r.json())
          .then(data => {
            // 更新频道名
            if (data.channel) {
              document.getElementById('task-channel-' + taskId).textContent = data.channel;
            }

            // 更新状态标签
            const statusEl = document.getElementById('task-status-' + taskId);
            statusEl.className = 'task-status ' + data.status;
            const statusText = {starting:'启动中', running:'运行中', done:'已完成', error:'出错'}[data.status] || data.status;
            statusEl.textContent = statusText;

            // 更新进度条
            if (data.total > 0) {
              const pct = Math.round((data.success + data.failed) / data.total * 100);
              document.getElementById('task-bar-' + taskId).style.width = pct + '%';
              document.getElementById('task-progress-' + taskId).textContent =
                `${data.success + data.failed}/${data.total}  (成功 ${data.success}  失败 ${data.failed})`;
            }

            // 追加日志
            const logEl = document.getElementById('task-log-' + taskId);
            for (const line of data.log) {
              const div = document.createElement('div');
              div.textContent = line;
              if (line.includes('成功')) div.className = 'ok';
              else if (line.includes('失败')) div.className = 'fail';
              else if (line.includes('跳过')) div.className = 'skip';
              logEl.appendChild(div);
            }
            logEl.scrollTop = logEl.scrollHeight;
            since = data.log_offset;

            // 更新统计
            if (data.status === 'done' || data.status === 'error') {
              clearInterval(interval);
              refreshStats();
            }
          })
          .catch(() => {});
      }, 2000);

      activeTasks[taskId] = interval;
    }

    function refreshStats() {
      fetch('/admin/videos')
        .then(r => r.json())
        .then(data => {
          document.getElementById('stat-total').textContent = data.length;
        });
    }

    // Enter 键提交
    document.getElementById('channel-url').addEventListener('keydown', e => {
      if (e.key === 'Enter') startTask();
    });
  </script>
</body>
</html>
